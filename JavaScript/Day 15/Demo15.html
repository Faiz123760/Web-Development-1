<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Object Modal- Event handler</title>
    <script>
        function btnClick(params) {
            alert("Hi.......")
        }

        function myFun(params) {
            console.log("hELLO" + params.value)
        }
    </script>
</head>

<body>

    <h1>>Document Object Modal- Event handler</h1>
    <button onclick="btnClick()">
        BUTTON
    </button>

    <INPut oninput="myFun(this)"></INPut>
</body>

</html>
