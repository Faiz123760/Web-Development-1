<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Object Modal- 1</title>
    <script>
        function btnClick(params) {
            let ele = document.getElementById("myH")
            console.log(ele);
            console.log(ele.textContent);
            ele.textContent = "Hello";

            ele.style.backgroundColor = '#bebebe'
            ele.style.color = 'navy'
            ele.style.border = '2px solid red'
            ele.style.textAlign = 'center'
            ele.style.lineHeight = '80px'

        }
    </script>
</head>

<body>
    <h1 id="myH">Document Object Modal</h1>
    <button onclick="btnClick()">
        Button
    </button>


</body>

</html>
